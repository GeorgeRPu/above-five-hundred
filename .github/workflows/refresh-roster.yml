name: Refresh World Cup roster snapshot

# Rebuilds the roster-strength snapshot from the EA Sports FC 26 ratings
# (committed to GitHub at EAFC26-DataHub). One unauthenticated fetch, no
# rate limit; EA updates ratings every few weeks, so weekly is plenty.

on:
  schedule:
    - cron: "0 9 * * 1" # Mondays
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-roster
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Rebuild roster snapshot
        run: uv run python scripts/fetch_roster.py

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain above500/data/roster_ratings.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add above500/data/roster_ratings.json
            git commit -m "Refresh World Cup roster snapshot"
            git push
          else
            echo "No roster changes."
          fi
