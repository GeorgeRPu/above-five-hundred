project:
  type: website
  output-dir: _site
  execute-dir: project

website:
  title: "Above .500"
  description: "Data-driven sports forecasts: win probabilities, power ratings and playoff odds from original statistical models."
  site-url: https://georgerpu.github.io/above-five-hundred
  search: false
  navbar:
    title: "Above .500"
    background: "#ffffff"
    foreground: "#555555"
    left:
      - text: "Forecasts"
        href: index.qmd
      - text: "Methodology"
        href: about.qmd
      - text: "GitHub"
        href: https://github.com/GeorgeRPu/above-five-hundred
  page-footer:
    left: "Above .500 — a FiveThirtyEight-style home for original sports models."
    right: "[Source & data on GitHub](https://github.com/GeorgeRPu/above-five-hundred)"

format:
  html:
    theme: [default, styles/above500.scss]
    page-layout: article
    grid:
      body-width: 1024px
    toc: false
    anchor-sections: false

execute:
  echo: false
  warning: false
  freeze: false
