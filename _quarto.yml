project:
  type: website
  output-dir: _site
  execute-dir: project
  render:
    - "**/*.qmd"   # site pages only; keeps docs/ model cards out of the build
  resources:
    - assets/logos/**

website:
  title: "Above .500"
  description: "Data-driven sports forecasts: win probabilities, power ratings and playoff odds from original statistical models."
  site-url: https://georgerpu.github.io/above-five-hundred
  search: false
  navbar:
    title: "Above .500"
    background: "#ffffff"
    foreground: "#555555"
    left:
      - text: "FIFA World Cup"
        href: forecasts/world-cup-2026.qmd
      - text: "NBA"
        menu:
          - text: "Team Elo Ratings"
            href: forecasts/nba-elo.qmd
          - text: "RAPTOR Player Ratings"
            href: forecasts/nba-raptor.qmd
      - text: "About"
        href: about.qmd
  page-footer:
    left: "Above .500 — a FiveThirtyEight-style home for original sports models."
    right: "[Source & data on GitHub](https://github.com/GeorgeRPu/above-five-hundred)"

format:
  html:
    theme: [default, styles/above500.scss]
    page-layout: article
    grid:
      body-width: 1024px
    toc: false
    anchor-sections: false

execute:
  echo: false
  warning: false
  freeze: false
